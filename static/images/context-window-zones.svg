<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">

  <!-- Background -->
  <rect width="520" height="580" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="260" y="32" fill="#8b949e" text-anchor="middle" font-size="11" letter-spacing="2">CLAUDE CODE CONTEXT WINDOW · 200K TOKENS</text>

  <!-- Main context bar -->
  <rect x="60" y="50" width="280" height="480" fill="#161b22" stroke="#30363d" stroke-width="1" rx="4"/>

  <!-- System overhead section -->
  <rect x="60" y="50" width="280" height="72" fill="#1c2128" rx="4"/>
  <rect x="60" y="118" width="280" height="4" fill="#161b22"/>
  <!-- System items -->
  <rect x="80" y="58" width="200" height="16" fill="#484f58" rx="3" opacity="0.8"/>
  <text x="180" y="70" fill="#c9d1d9" text-anchor="middle" font-size="10">System Instructions</text>
  <rect x="80" y="78" width="160" height="16" fill="#484f58" rx="3" opacity="0.7"/>
  <text x="160" y="90" fill="#c9d1d9" text-anchor="middle" font-size="10">CLAUDE.md</text>
  <rect x="80" y="98" width="220" height="16" fill="#484f58" rx="3" opacity="0.6"/>
  <text x="190" y="110" fill="#c9d1d9" text-anchor="middle" font-size="10">Tool Definitions + MCP Schemas</text>

  <!-- Smart zone -->
  <rect x="60" y="122" width="280" height="120" fill="#0d1117" rx="0"/>
  <!-- User message bubble -->
  <rect x="80" y="132" width="220" height="24" fill="#1f6feb" rx="4" opacity="0.8"/>
  <text x="190" y="148" fill="#fff" text-anchor="middle" font-size="10">Your prompt + conversation</text>

  <text x="200" y="195" fill="#3fb950" text-anchor="middle" font-size="16" font-weight="bold" opacity="0.9">the smart zone</text>
  <text x="200" y="215" fill="#3fb950" text-anchor="middle" font-size="11" opacity="0.6">~50K tokens of focused work</text>

  <!-- 40% threshold line -->
  <line x1="50" y1="242" x2="350" y2="242" stroke="#d29922" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="355" y="228" width="155" height="28" fill="none"/>
  <text x="362" y="240" fill="#d29922" font-size="14" font-weight="bold">40% context used</text>
  <text x="362" y="254" fill="#8b949e" font-size="11">← yellow threshold</text>

  <!-- Dumb zone -->
  <rect x="60" y="242" width="280" height="182" fill="#1a0d0d" rx="0" opacity="0.5"/>

  <text x="200" y="320" fill="#f85149" text-anchor="middle" font-size="16" font-weight="bold" opacity="0.7">the dumb zone</text>
  <text x="200" y="340" fill="#f85149" text-anchor="middle" font-size="11" opacity="0.4">attention dilutes, quality fades</text>

  <!-- Downward arrow -->
  <path d="M 200 360 L 200 400 L 190 390 M 200 400 L 210 390" stroke="#f85149" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Reserved sections at bottom — neutral, same style as system overhead -->
  <rect x="60" y="424" width="280" height="48" fill="#1c2128" rx="0"/>
  <text x="200" y="444" fill="#8b949e" text-anchor="middle" font-size="11">reserved for auto-compact</text>
  <text x="200" y="460" fill="#6e7681" text-anchor="middle" font-size="10">13K tokens</text>

  <rect x="60" y="472" width="280" height="58" fill="#1c2128" rx="0"/>
  <rect x="60" y="526" width="280" height="4" fill="#161b22" rx="0 0 4 4"/>
  <text x="200" y="498" fill="#8b949e" text-anchor="middle" font-size="11">reserved for output</text>
  <text x="200" y="514" fill="#6e7681" text-anchor="middle" font-size="10">32K tokens</text>

  <!-- Right side bracket -->
  <line x1="348" y1="50" x2="355" y2="50" stroke="#484f58" stroke-width="1"/>
  <line x1="355" y1="50" x2="355" y2="530" stroke="#484f58" stroke-width="1"/>
  <line x1="348" y1="530" x2="355" y2="530" stroke="#484f58" stroke-width="1"/>
</svg>
