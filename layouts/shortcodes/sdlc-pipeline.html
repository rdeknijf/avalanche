<figure id="sdlc-pipeline" aria-label="Where AI agents fit across the software development lifecycle, and the feedback loop each one relies on."></figure>

<style>
/* ===================================================================== */
/*  PALETTE  — all colours are CSS custom properties so you can retune    */
/*  in one place. We read the host theme's tokens first (--theme,         */
/*  --primary, --secondary, --tertiary) and fall back to the parchment    */
/*  hexes when they're absent.                                            */
/* ===================================================================== */
#sdlc-pipeline {
  position: relative;
  /* --- structural theme (light / parchment) --- */
  --sp-bg:      var(--theme,     #fdf6ec);
  --sp-text:    var(--primary,   #3d2e1e);
  --sp-muted:   var(--secondary, #7a6652);
  --sp-border:  var(--tertiary,  #e4d5c1);
  --sp-accent:  #8b4513;                       /* saddle brown — pipeline accent */
  --sp-improver:#a86a2c;                        /* improver gets a distinct warm accent */
  --sp-panel:   color-mix(in oklab, var(--sp-text) 4%, var(--sp-bg));

  /* --- capability tints (the colour dimension; muted, parchment-friendly) --- */
  --cap-read:          #5f7d8c;   /* Read & advise     */
  --cap-generate:      #b3812f;   /* Generate          */
  --cap-autonomous:    #a6603a;   /* Autonomous action */
  --cap-deterministic: #9a8b7a;   /* Keep deterministic*/
  --cap-gate:          #97413f;   /* Gate              */

  /* --- layout knobs --- */
  --sp-col-w: 150px;     /* width of one phase column          */
  --sp-arrow-w: 30px;    /* width of the forward-arrow gap      */
  --sp-anim: .42s;       /* show/hide transition duration       */

  /* container + COLUMN BREAKOUT.
     The figure is allowed to grow wider than the article's text column, up to
     --sp-maxw, using whatever width the viewport offers. This assumes a
     CENTERED content column (the common blog case): we anchor the figure on
     the column's centre and let it expand symmetrically past both edges.
     If your theme's column is NOT centred, replace the three breakout lines
     with a plain `width: 100%;`. */
  --sp-maxw: 2850px;                    /* hard cap on figure width (Fever Dream natural width ~2670 + one-column headroom) */
  width: min(var(--sp-maxw), 96vw);
  margin-left: 50%;
  transform: translateX(-50%);
  font-family: "EB Garamond", Georgia, serif;
  color: var(--sp-text);
  margin-top: 2.4em;
  margin-bottom: 2.4em;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* dark theme via host .dark class (preferred) … */
:where(html.dark, body.dark) #sdlc-pipeline,
.dark #sdlc-pipeline {
  --sp-bg:     var(--theme,     #1a1816);
  --sp-text:   var(--primary,   #e0d5c7);
  --sp-muted:  var(--secondary, #9a8b7a);
  --sp-border: var(--tertiary,  #3a332c);
  --sp-accent: #d4a574;
  --sp-improver:#e0b06a;
  --cap-read:          #8fb0c0;
  --cap-generate:      #d4a574;
  --cap-autonomous:    #d08a63;
  --cap-deterministic: #b3a392;
  --cap-gate:          #cc7a78;
}
/* … and prefers-color-scheme as a backstop when the host sets no class */
@media (prefers-color-scheme: dark) {
  :where(html:not(.light), body:not(.light)) #sdlc-pipeline {
    --sp-bg:     var(--theme,     #1a1816);
    --sp-text:   var(--primary,   #e0d5c7);
    --sp-muted:  var(--secondary, #9a8b7a);
    --sp-border: var(--tertiary,  #3a332c);
    --sp-accent: #d4a574;
    --sp-improver:#e0b06a;
    --cap-read:          #8fb0c0;
    --cap-generate:      #d4a574;
    --cap-autonomous:    #d08a63;
    --cap-deterministic: #b3a392;
    --cap-gate:          #cc7a78;
  }
}

#sdlc-pipeline * { box-sizing: border-box; overflow-wrap: normal; word-break: normal; hyphens: none; }

/* ---------- header / controls ---------- */
#sdlc-pipeline .sp-head {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  justify-content: space-between; gap: 16px 24px;
  margin-bottom: 22px;
}
#sdlc-pipeline .sp-title {
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-weight: 600; font-size: 12px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--sp-muted);
  margin: 0 0 4px;
}
#sdlc-pipeline .sp-dek {
  font-size: 16px; line-height: 1.45; color: var(--sp-text);
  margin: 0; max-width: 46ch; font-style: italic;
}

/* detail-level segmented control */
#sdlc-pipeline .sp-ctrls { display: flex; flex-wrap: wrap; gap: 14px 22px; align-items: flex-end; }
#sdlc-pipeline .sp-detail { display: flex; flex-direction: column; gap: 6px; }
#sdlc-pipeline .sp-detail-label {
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--sp-muted);
}
#sdlc-pipeline .sp-seg {
  display: inline-flex; border: 1px solid var(--sp-border); border-radius: 999px;
  padding: 3px; background: var(--sp-panel); gap: 2px;
}
#sdlc-pipeline .sp-seg button {
  font: 500 13px/1 "Source Sans 3", system-ui, sans-serif;
  color: var(--sp-muted); background: transparent; border: 0;
  padding: 7px 14px; border-radius: 999px; cursor: pointer;
  transition: color var(--sp-anim) ease, background var(--sp-anim) ease;
  white-space: nowrap;
}
#sdlc-pipeline .sp-seg button[aria-checked="true"] {
  color: var(--sp-bg); background: var(--sp-accent);
}
#sdlc-pipeline .sp-seg button:focus-visible {
  outline: 2px solid var(--sp-accent); outline-offset: 2px;
}

/* ---------- controls band: type (legend) | handwritten nudge | detail ---------- */
#sdlc-pipeline .sp-controls {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  justify-content: space-between; gap: 12px 24px; margin: 0 0 20px;
}
#sdlc-pipeline .sp-controls .sp-legend { margin: 0; }
#sdlc-pipeline .sp-controls .sp-detail { align-items: flex-start; }

/* each control group + its handwritten arrow travel together as one cluster,
   so the arrow stays adjacent to its group at any band width */
#sdlc-pipeline .sp-cluster {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; min-width: 0;
}

/* handwritten nudge hugging its control group (arrow points at the group) */
#sdlc-pipeline .sp-note {
  flex: none; align-self: center; min-width: 0;
  display: flex; align-items: center; justify-content: center; gap: 2px;
  color: var(--sp-improver);
  opacity: 0; transform: translateY(2px);
  transition: opacity .4s ease, transform .4s ease;
  pointer-events: none;
}
#sdlc-pipeline[data-demo="idle"] .sp-note { opacity: 1; transform: none; }
#sdlc-pipeline .sp-note-text {
  font-family: "Caveat", "Segoe Print", "Bradley Hand", cursive;
  font-weight: 700; font-size: 24px; line-height: 1; white-space: nowrap;
  transform: rotate(-3deg);
}
#sdlc-pipeline .sp-note-arr { flex: none; width: 46px; height: 21px; opacity: .85; }

/* ---------- legend ---------- */
#sdlc-pipeline .sp-legend {
  display: flex; flex-wrap: wrap; gap: 6px 8px; margin: 0 0 18px;
}
#sdlc-pipeline .sp-legend button {
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  font: 500 12px/1 "Source Sans 3", system-ui, sans-serif;
  color: var(--sp-muted); background: transparent;
  border: 1px solid var(--sp-border); border-radius: 999px;
  padding: 6px 11px 6px 9px; cursor: pointer;
  transition: border-color .2s ease, color .2s ease, opacity .2s ease;
}
#sdlc-pipeline .sp-legend button .sp-swatch {
  width: 11px; height: 11px; border-radius: 3px; flex: none;
  background: var(--c); border: 1px solid color-mix(in oklab, var(--c) 60%, transparent);
}
#sdlc-pipeline .sp-legend button:hover { color: var(--sp-text); border-color: var(--c); }
#sdlc-pipeline .sp-legend button[aria-pressed="true"] {
  color: var(--sp-text); border-color: var(--c);
  background: color-mix(in oklab, var(--c) 12%, transparent);
}
/* when a filter is active, fade the legend chips that aren't selected */
#sdlc-pipeline[data-filter] .sp-legend button:not([aria-pressed="true"]) { opacity: .45; }
#sdlc-pipeline .sp-legend button:focus-visible { outline: 2px solid var(--c); outline-offset: 2px; }

/* ---------- viewport (holds the scroll region + edge fades + hint) ---------- */
#sdlc-pipeline .sp-viewport { position: relative; }

/* edge fade gradients — appear only on the side that has more content,
   the clearest "there's more this way" signal. They blend into the page
   background (--sp-bg) and never intercept pointer events. */
#sdlc-pipeline .sp-fade {
  position: absolute; top: 0; bottom: 8px; width: 48px; z-index: 6;
  pointer-events: none; opacity: 0; transition: opacity .25s ease;
}
#sdlc-pipeline .sp-fade-l { left: 0;  background: linear-gradient(to right, var(--sp-bg), transparent); }
#sdlc-pipeline .sp-fade-r { right: 0; background: linear-gradient(to left,  var(--sp-bg), transparent); }
#sdlc-pipeline .sp-viewport[data-scroll-l="true"] .sp-fade-l { opacity: 1; }
#sdlc-pipeline .sp-viewport[data-scroll-r="true"] .sp-fade-r { opacity: 1; }

/* "drag to explore" hint — fades out after the first interaction */
#sdlc-pipeline .sp-hint {
  position: absolute; right: 16px; bottom: 14px; z-index: 7;
  display: inline-flex; align-items: center; gap: 7px;
  font: 500 11.5px/1 "Source Sans 3", system-ui, sans-serif;
  letter-spacing: .03em; color: var(--sp-bg);
  background: color-mix(in oklab, var(--sp-text) 80%, transparent);
  padding: 8px 12px; border-radius: 999px;
  pointer-events: none; opacity: 0; transition: opacity .3s ease;
}
#sdlc-pipeline .sp-viewport[data-hint="true"] .sp-hint { opacity: 1; }
#sdlc-pipeline .sp-hint svg { width: 16px; height: 9px; }

/* ---------- scroll region + inner ---------- */
#sdlc-pipeline .sp-scroll {
  overflow-x: auto; overflow-y: visible; padding-bottom: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--sp-border) transparent;
}
/* grab cursor only while the row actually overflows (toggled in JS) */
#sdlc-pipeline .sp-scroll.sp-pan { cursor: grab; }
#sdlc-pipeline .sp-scroll[data-drag="true"] { cursor: grabbing; user-select: none; }
#sdlc-pipeline .sp-scroll[data-fit="true"] { cursor: default; overflow: hidden; }
#sdlc-pipeline .sp-scroll::-webkit-scrollbar { height: 7px; }
#sdlc-pipeline .sp-scroll::-webkit-scrollbar-thumb {
  background: var(--sp-border); border-radius: 99px;
}
/* in fit/overview mode the inner is scaled down from the top-left */
#sdlc-pipeline .sp-inner.sp-fit { transform-origin: top left; }
#sdlc-pipeline .sp-inner {
  position: relative;          /* tooltip anchor + connector alignment */
  width: max-content;
  min-width: 100%;
  padding-top: 4px;
}

/* ---------- the phase row ---------- */
/* centre the phases when the figure is wider than the content (low detail
   levels / ultrawide); `safe` falls back to start-alignment when the content
   overflows, so the leftmost phase never becomes unreachable behind a scroll. */
#sdlc-pipeline .sp-row { display: flex; align-items: stretch; justify-content: safe center; }
#sdlc-pipeline .sp-phase {
  flex: 0 0 auto; width: var(--sp-col-w);
  display: flex; flex-direction: column;
  transition: width var(--sp-anim) ease, opacity var(--sp-anim) ease;
  overflow: hidden;
}
#sdlc-pipeline .sp-phase[data-visible="false"] {
  width: 0; opacity: 0; pointer-events: none;
}
#sdlc-pipeline .sp-phase-inner {
  width: var(--sp-col-w); padding: 0 7px;
  display: flex; flex-direction: column;
}
/* phase header */
#sdlc-pipeline .sp-phase-head {
  text-align: center; padding-bottom: 10px; margin-bottom: 12px;
  border-bottom: 1px solid var(--sp-border);
}
#sdlc-pipeline .sp-phase-num {
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 10px; letter-spacing: .12em; color: var(--sp-muted);
  display: block; margin-bottom: 3px;
}
#sdlc-pipeline .sp-phase-name {
  font-size: 17px; font-weight: 500; line-height: 1.15; color: var(--sp-text);
}

/* forward arrows between phases */
#sdlc-pipeline .sp-arrow {
  flex: 0 0 auto; width: var(--sp-arrow-w);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 18px; color: var(--sp-muted);
  transition: width var(--sp-anim) ease, opacity var(--sp-anim) ease;
  overflow: hidden;
}
#sdlc-pipeline .sp-arrow[data-visible="false"] { width: 0; opacity: 0; }
#sdlc-pipeline .sp-arrow svg { width: 22px; height: 12px; display: block; }

/* ---------- slots ---------- */
#sdlc-pipeline .sp-slots { display: flex; flex-direction: column; gap: 9px; }
#sdlc-pipeline .sp-slot {
  --c: var(--cap-generate);
  position: relative;
  border: 1px solid color-mix(in oklab, var(--c) 42%, var(--sp-border));
  border-left: 3px solid var(--c);
  background: color-mix(in oklab, var(--c) 9%, var(--sp-bg));
  border-radius: 5px; padding: 8px 9px 9px;
  cursor: default;
  transition: opacity var(--sp-anim) ease, transform var(--sp-anim) ease,
              max-height var(--sp-anim) ease, margin var(--sp-anim) ease,
              padding var(--sp-anim) ease, border-width var(--sp-anim) ease;
  max-height: 220px; overflow: hidden;
}
#sdlc-pipeline .sp-slot[data-visible="false"] {
  opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0;
  margin-top: -9px; border-top-width: 0; border-bottom-width: 0;
  transform: translateY(-4px); pointer-events: none;
}
#sdlc-pipeline .sp-slot-top { display: flex; align-items: baseline; gap: 6px; }
#sdlc-pipeline .sp-marker {           /* the little feedback-loop glyph */
  color: var(--c); font-size: 13px; line-height: 1; flex: none;
  transform: translateY(1px);
}
#sdlc-pipeline .sp-slot-name { font-size: 14.5px; line-height: 1.18; font-weight: 500; overflow-wrap: break-word; }
#sdlc-pipeline .sp-cap {
  display: inline-block; margin-top: 4px;
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 9.5px; letter-spacing: .07em; text-transform: uppercase;
  color: var(--c);
}
/* inline block — no longer shown (all levels use the hover/focus tooltip) */
#sdlc-pipeline .sp-loop-inline {
  display: none;
  margin-top: 7px; padding-top: 7px;
  border-top: 1px dashed color-mix(in oklab, var(--c) 40%, var(--sp-border));
}
#sdlc-pipeline .sp-desc {
  margin: 0 0 7px; font-size: 12.5px; line-height: 1.36; color: var(--sp-text);
}
#sdlc-pipeline .sp-loop-row { display: block; }
#sdlc-pipeline .sp-loop-lbl {
  display: inline-block; margin-right: 5px;
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--c);
}
#sdlc-pipeline .sp-loop-txt {
  font-size: 12.5px; font-style: italic; line-height: 1.36; color: var(--sp-muted);
}
/* the eval-loop label reads differently for a deterministic (non-AI) check */
#sdlc-pipeline .sp-loop-det .sp-loop-lbl { color: var(--sp-muted); }
#sdlc-pipeline .sp-loop-det .sp-loop-txt { font-style: normal; }

/* slot focus / hover */
#sdlc-pipeline .sp-slot:hover,
#sdlc-pipeline .sp-slot:focus-visible {
  border-color: var(--c);
  background: color-mix(in oklab, var(--c) 15%, var(--sp-bg));
  outline: none;
}
#sdlc-pipeline .sp-slot:focus-visible { box-shadow: 0 0 0 2px color-mix(in oklab, var(--c) 55%, transparent); }

/* dim slots filtered out by the legend */
#sdlc-pipeline[data-filter] .sp-slot:not([data-cap-match="true"]) { opacity: .16; }

/* ===================================================================== */
/*  DETERMINISTIC (non-AI) SLOTS — the tests / checks we've always run.   */
/*  These are NOT agents: no capability colour, no eval-loop marker, a    */
/*  monospaced "scripted" treatment + square corners set them apart.      */
/*  Three switchable looks via the [data-det] attribute on #sdlc-pipeline:*/
/*    data-det="mono"   plain monospace card (default)                    */
/*    data-det="hatch"  + diagonal blueprint hatch fill                   */
/*    data-det="ledger" + a grey top rule instead of a left colour stripe */
/* ===================================================================== */
#sdlc-pipeline .sp-slot[data-cap="deterministic"] {
  --c: var(--sp-muted);
  border-radius: 1px;                                  /* square, not rounded */
  border: 1px solid color-mix(in oklab, var(--sp-muted) 48%, var(--sp-border));
  background: color-mix(in oklab, var(--sp-muted) 7%, var(--sp-bg));
}
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-slot-name,
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-cap,
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-marker,
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-loop-lbl,
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-loop-txt {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-slot-name { font-size: 13px; font-weight: 600; letter-spacing: -.01em; }
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-marker { font-size: 11px; transform: translateY(0); }
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-cap { letter-spacing: .02em; }
#sdlc-pipeline .sp-slot[data-cap="deterministic"] .sp-loop-txt { font-size: 11.5px; }
#sdlc-pipeline .sp-slot[data-cap="deterministic"]:hover,
#sdlc-pipeline .sp-slot[data-cap="deterministic"]:focus-visible {
  border-color: var(--sp-muted);
  background: color-mix(in oklab, var(--sp-muted) 13%, var(--sp-bg));
  box-shadow: none;
}
/* option: diagonal hatch fill */
#sdlc-pipeline[data-det="hatch"] .sp-slot[data-cap="deterministic"] {
  background:
    repeating-linear-gradient(45deg,
      color-mix(in oklab, var(--sp-muted) 13%, var(--sp-bg)) 0,
      color-mix(in oklab, var(--sp-muted) 13%, var(--sp-bg)) 1px,
      transparent 1px, transparent 6px),
    var(--sp-bg);
}
/* option: grey top rule (instead of the AI slots' left colour stripe) */
#sdlc-pipeline[data-det="ledger"] .sp-slot[data-cap="deterministic"] {
  border-top: 3px solid color-mix(in oklab, var(--sp-muted) 70%, var(--sp-border));
  background: var(--sp-bg);
}

/* ---------- connector row: per-phase risers + a full-width harvest bus ----------
   The risers + bus live INSIDE the scroll region, so they stay aligned with the
   phases as the reader scrolls. The bus spans the whole pipeline width, so a
   single centred stem from the (non-scrolling) Improver below always meets it. */
#sdlc-pipeline .sp-conns { position: relative; display: flex; align-items: stretch; justify-content: safe center; height: 36px; }
#sdlc-pipeline .sp-bus {            /* the horizontal "harvest" line */
  position: absolute; left: 0; right: 0; bottom: 0; height: 0;
  border-top: 1.5px dashed color-mix(in oklab, var(--sp-improver) 60%, transparent);
}
#sdlc-pipeline .sp-conn {
  flex: 0 0 auto; width: var(--sp-col-w);
  position: relative;
  transition: width var(--sp-anim) ease, opacity var(--sp-anim) ease;
  overflow: hidden;
}
#sdlc-pipeline .sp-conn[data-visible="false"] { width: 0; opacity: 0; }
#sdlc-pipeline .sp-conn::before {           /* the dashed vertical line */
  content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
  border-left: 1.5px dashed color-mix(in oklab, var(--sp-improver) 55%, transparent);
}
#sdlc-pipeline .sp-conn-gap { flex: 0 0 auto; width: var(--sp-arrow-w);
  transition: width var(--sp-anim) ease; overflow: hidden; }
#sdlc-pipeline .sp-conn-gap[data-visible="false"] { width: 0; }

/* ---------- the Improver node ----------
   Lives OUTSIDE the scroll region, centred under the viewport at a normal
   reading width — so it holds still while the pipeline scrolls behind/above it.
   A short dashed stem links it up to the harvest bus. */
#sdlc-pipeline .sp-improver-wrap {
  display: flex; flex-direction: column; align-items: center;
}
#sdlc-pipeline .sp-improver-stem {
  width: 0; height: 22px;
  border-left: 1.5px dashed var(--sp-improver);
}
#sdlc-pipeline .sp-improver {
  position: relative;
  width: 100%; max-width: 680px;
  border: 1.5px dashed var(--sp-improver);
  border-radius: 8px;
  background: color-mix(in oklab, var(--sp-improver) 8%, var(--sp-bg));
  padding: 15px 20px;
  display: flex; gap: 20px; align-items: flex-start;
}
#sdlc-pipeline .sp-improver-badge { flex: none; max-width: 168px; }
#sdlc-pipeline .sp-improver-kicker {
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--sp-improver); margin-bottom: 4px;
}
#sdlc-pipeline .sp-improver-name {
  font-size: 22px; font-weight: 600; line-height: 1.05; color: var(--sp-text);
}
#sdlc-pipeline .sp-improver-loop {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
  font-family: "Source Sans 3", system-ui, sans-serif;
  font-size: 10.5px; letter-spacing: .04em; color: var(--sp-improver);
}
#sdlc-pipeline .sp-improver-body {
  font-size: 14.5px; line-height: 1.5; color: var(--sp-muted);
  border-left: 1px solid var(--sp-border); padding-left: 18px;
}
#sdlc-pipeline .sp-improver-body strong { color: var(--sp-text); font-weight: 600; }
@media (max-width: 560px) {
  #sdlc-pipeline .sp-improver { flex-direction: column; gap: 12px; }
  #sdlc-pipeline .sp-improver-body { border-left: 0; padding-left: 0;
    border-top: 1px solid var(--sp-border); padding-top: 12px; }
  #sdlc-pipeline .sp-improver-badge { max-width: none; }
}

/* ---------- tooltip (description + eval loop on hover/focus at L2 / L3) ---------- */
#sdlc-pipeline .sp-tip {
  position: absolute; z-index: 20; width: max-content; max-width: 240px; white-space: normal;
  background: var(--sp-text); color: var(--sp-bg);
  border-radius: 6px; padding: 10px 12px;
  font-size: 12.5px; line-height: 1.4;
  box-shadow: 0 6px 22px rgba(0,0,0,.18);
  opacity: 0; visibility: hidden;
  transform: translateX(-50%) translateY(4px);
  transition: opacity .16s ease, transform .16s ease;
  pointer-events: none;
}

  /* =================================================================== */
  var root = document.getElementById("sdlc-pipeline");

  leftGroup.appendChild(noteLeft);

  ctip.appendChild(ctipBody);

  function bindCtrlTip(elm, title, text) {
    var show = function () {
      ctipTitle.textContent = title;
      ctipBody.textContent = text;
      ctip.setAttribute("data-show", "true");
      var rr = root.getBoundingClientRect();
      var er = elm.getBoundingClientRect();

      ctip.style.top = (er.bottom - rr.top + 8) + "px";

    elm.addEventListener("mouseleave", hide);
    elm.addEventListener("focus", show);
    elm.addEventListener("blur", hide);

  /* =================================================================== */

      if (pe._connGap) pe._connGap.setAttribute("data-visible", arrowVisible ? "true" : "false");

  /* =================================================================== */
  /*  TOOLTIP  (shown for L2/L3 hover & focus; at L1 the loop is inline)  */
  /* =================================================================== */
  function bindTip(slotEl, slot, isDet) {

    if (nudged) return;
    nudged = true;
    if (reduceMotion || state.view === "fit") return;
    var max = scroll.scrollWidth - scroll.clientWidth;
    if (max < 24) return;                      // nothing to reveal
    var amt = Math.min(64, max), dur = 1150, t0 = null;
    nudgeAnimating = true;
    function frame(t) {
      if (t0 === null) t0 = t;
      var p = Math.min(1, (t - t0) / dur);
      // out-and-back: a single sine bump (0 → amt → 0), eased at both ends
      scroll.scrollLeft = amt * Math.sin(p * Math.PI);
      if (p < 1) { requestAnimationFrame(frame); }
      else { scroll.scrollLeft = 0; nudgeAnimating = false; }
    }
    requestAnimationFrame(frame);
  }
  if (typeof IntersectionObserver !== "undefined") {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting && en.intersectionRatio > 0.3) { nudge(); io.disconnect(); }
      });
    }, { threshold: [0, 0.3, 0.6] });
    io.observe(root);
  } else {
    setTimeout(nudge, 900);
  }

  /* =================================================================== */
  /*  INIT                                                                */
  /* =================================================================== */
  setLevel(START_LEVEL);
  setFilter(null);
  root.setAttribute("data-det", "mono");   // deterministic-slot look: mono | hatch | ledger
  updateFades();

  // arm the first-run demo + nudge ring, fire once the figure scrolls into view
  root.setAttribute("data-demo", "idle");
  if ("IntersectionObserver" in window) {
    var demoIO = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { runDemo(); demoIO.disconnect(); }
      });
    }, { threshold: 0.25 });
    demoIO.observe(root);
  } else {
    runDemo();
  }

  // tiny DOM helper
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }
})();
</script>
